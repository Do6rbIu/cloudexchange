# Single public entry-point. Phase 3 will add a 443 server block and
# redirect 80→443; for now Phase 1 ships HTTP-only for local dev.

upstream bff_upstream {
    server bff:4000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
}

upstream sogo_upstream {
    server sogo:20000;
    keepalive 32;
}

# ActiveSync HTTP requests can run *very* long (the Ping verb can hold
# the socket open for minutes). We give SOGo room to breathe.
map $request_method $cx_eas_timeout {
    default     360s;
    "POST"      900s;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Security defaults — work over HTTP too, hardened further once TLS is on.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # BFF — REST API behind /api/
    location /api/ {
        proxy_pass http://bff_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health endpoint exposed directly for liveness probes.
    location = /healthz {
        access_log off;
        proxy_pass http://bff_upstream/api/health;
    }

    # SOGo web UI / CalDAV / CardDAV — proxied at /SOGo
    location /SOGo {
        proxy_pass http://sogo_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-webobjects-server-name $host;
        proxy_set_header x-webobjects-server-protocol HTTP/1.0;
        proxy_set_header x-webobjects-server-url $scheme://$host;
        proxy_set_header x-webobjects-server-port $server_port;
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
        proxy_read_timeout 240s;
        proxy_send_timeout 240s;
    }

    # Microsoft ActiveSync — used by native Outlook/iOS/Android mail apps.
    # SOGo handles EAS at this path; we expose it as-is so client devices
    # can connect with "https://mail.example.com" as the server.
    location /Microsoft-Server-ActiveSync {
        proxy_pass http://sogo_upstream/SOGo/Microsoft-Server-ActiveSync;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-webobjects-server-name $host;
        proxy_set_header x-webobjects-server-protocol HTTP/1.0;
        proxy_set_header x-webobjects-server-url $scheme://$host;
        proxy_set_header x-webobjects-server-port $server_port;
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
        proxy_connect_timeout 75s;
        proxy_send_timeout    $cx_eas_timeout;
        proxy_read_timeout    $cx_eas_timeout;
        client_body_timeout   $cx_eas_timeout;
        client_max_body_size  64m;
    }

    # Well-known DAV discovery — many clients probe these before SOGo.
    location = /.well-known/caldav {
        return 301 /SOGo/dav/;
    }
    location = /.well-known/carddav {
        return 301 /SOGo/dav/;
    }
    # Outlook autodiscover — pointed at SOGo's autodiscover endpoint.
    location ~ ^/(autodiscover|Autodiscover|AutoDiscover)/autodiscover\.xml$ {
        proxy_pass http://sogo_upstream/SOGo/Microsoft-Server-ActiveSync/autodiscover.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static SPA + SPA fallback served by the inner frontend nginx.
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
