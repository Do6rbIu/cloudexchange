# Single public entry-point. Phase 3 will add a 443 server block and
# redirect 80→443; for now Phase 1 ships HTTP-only for local dev.

upstream bff_upstream {
    server bff:4000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Security defaults — work over HTTP too, hardened further once TLS is on.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # BFF — REST API behind /api/
    location /api/ {
        proxy_pass http://bff_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health endpoint exposed directly for liveness probes.
    location = /healthz {
        access_log off;
        proxy_pass http://bff_upstream/api/health;
    }

    # Static SPA + SPA fallback served by the inner frontend nginx.
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
