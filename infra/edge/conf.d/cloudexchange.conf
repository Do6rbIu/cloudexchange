upstream bff_upstream {
    server bff:4000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
}

upstream sogo_upstream {
    server sogo:20000;
    keepalive 32;
}

# ActiveSync HTTP requests can run very long (the Ping verb can hold the
# socket open for minutes).
map $request_method $cx_eas_timeout {
    default     360s;
    "POST"      900s;
}

# ────────────────────────────────────────────────────────────────────────
# Port 80 — ACME HTTP-01 challenge + redirect to HTTPS.
#
# In dev (self-signed) the app is still reachable on :80 so the demo works
# without certificate warnings on the first hop. To enforce HTTPS-only,
# uncomment the `return 301` line and remove the app-locations include.
# ────────────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt HTTP-01 challenge — always served over plain HTTP.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # PRODUCTION: force HTTPS by uncommenting the next line.
    # return 301 https://$host$request_uri;

    # DEV: keep the app reachable over plain HTTP too.
    include /etc/nginx/snippets/app-locations.conf;
}

# ────────────────────────────────────────────────────────────────────────
# Port 443 — TLS termination for the whole stack.
# ────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:CXSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers (HSTS only meaningful over HTTPS).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    include /etc/nginx/snippets/app-locations.conf;
}
