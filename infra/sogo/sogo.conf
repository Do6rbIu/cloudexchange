{
    /* ──────────────────────────────────────────────────────────────────
     * Persistent storage — SOGo metadata (calendars, address books,
     * user profiles, ACLs, sessions, store) all live in PostgreSQL.
     * The actual mail bodies stay in Dovecot's Maildir.
     * ────────────────────────────────────────────────────────────────── */
    SOGoProfileURL       = "postgresql://sogo:sogo@postgres:5432/sogo/sogo_user_profile";
    OCSFolderInfoURL     = "postgresql://sogo:sogo@postgres:5432/sogo/sogo_folder_info";
    OCSSessionsFolderURL = "postgresql://sogo:sogo@postgres:5432/sogo/sogo_sessions_folder";
    OCSCacheFolderURL    = "postgresql://sogo:sogo@postgres:5432/sogo/sogo_cache_folder";
    OCSStoreURL          = "postgresql://sogo:sogo@postgres:5432/sogo/sogo_store";
    OCSAclURL            = "postgresql://sogo:sogo@postgres:5432/sogo/sogo_acl";
    OCSEMailAlarmsFolderURL = "postgresql://sogo:sogo@postgres:5432/sogo/sogo_alarms_folder";

    /* ──────────────────────────────────────────────────────────────────
     * Mail backbone wiring
     * ────────────────────────────────────────────────────────────────── */
    SOGoIMAPServer          = "imap://mailserver:143/?TLS=NO";
    SOGoSMTPServer          = "smtp://mailserver:587";
    SOGoMailingMechanism    = smtp;
    SOGoMailDomain          = "cloudexchange.local";
    SOGoForceExternalLoginWithEmail = NO;
    SOGoAppointmentSendEMailNotifications = YES;
    SOGoFoldersSendEMailNotifications = NO;
    SOGoSentFolderName      = "Sent";
    SOGoTrashFolderName     = "Trash";
    SOGoDraftsFolderName    = "Drafts";
    SOGoJunkFolderName      = "Junk";

    /* ──────────────────────────────────────────────────────────────────
     * Authentication — IMAP-based, so passwords never live in our DB.
     * SQL user source feeds SOGo the *attributes* (mail, name, home),
     * but bindFields routes the login to IMAP via SOGoAuthenticationType.
     * ────────────────────────────────────────────────────────────────── */
    SOGoAuthenticationType    = imap;
    SOGoPasswordChangeEnabled = NO;
    SOGoCookieAuthEnabled     = YES;
    SOGoTrustProxyAuthentication = NO;
    SOGoXSRFValidationEnabled = YES;
    SOGoEncryptionKey         = "REPLACE-WITH-32-BYTE-RANDOM";

    SOGoUserSources = (
        {
            type            = sql;
            id              = users;
            viewURL         = "postgresql://sogo:sogo@postgres:5432/sogo/sogo_users";
            canAuthenticate = YES;
            isAddressBook   = NO;
            userPasswordAlgorithm = plain;
            displayName     = "Cloud24 Exchange Users";
            authenticationMethod = imap;
        }
    );

    /* ──────────────────────────────────────────────────────────────────
     * Caching layer
     * ────────────────────────────────────────────────────────────────── */
    SOGoMemcachedHost = "memcached";

    /* ──────────────────────────────────────────────────────────────────
     * Locale + UI
     * ────────────────────────────────────────────────────────────────── */
    SOGoTimeZone           = "Europe/Moscow";
    SOGoLanguage           = Russian;
    SOGoSupportedLanguages = (English, Russian);
    SOGoFirstDayOfWeek     = 1;
    SOGoTimeFormat         = "%H:%M";
    SOGoShortDateFormat    = "%Y-%m-%d";

    /* ──────────────────────────────────────────────────────────────────
     * Calendaring / scheduling
     * ────────────────────────────────────────────────────────────────── */
    SOGoCalendarDefaultRoles = (
        "PublicViewer",
        "ConfidentialDAndTViewer"
    );
    SOGoDefaultCalendar      = "personal";
    SOGoSuperUsernames       = (admin);

    /* ──────────────────────────────────────────────────────────────────
     * Microsoft ActiveSync — exposes EAS at /Microsoft-Server-ActiveSync,
     * the protocol native Outlook / iOS / Android Mail clients speak.
     * ────────────────────────────────────────────────────────────────── */
    SOGoEnableEMailReminders = YES;
    SOGoMaximumPingInterval  = 354;
    SOGoMaximumSyncInterval  = 354;
    SOGoMaximumSyncResponseSize = 2048;
    SOGoMaximumSyncWindowSize = 100;

    /* ──────────────────────────────────────────────────────────────────
     * Process / runtime
     * ────────────────────────────────────────────────────────────────── */
    SxVMemLimit  = 384;
    WOPort       = "0.0.0.0:20000";
    WOWorkersCount = 3;
    WOLogFile    = "-";
    WOPidFile    = "/var/run/sogo/sogo.pid";

    SOGoCookieName = "0xHIGHFLYxSOGo";
}
