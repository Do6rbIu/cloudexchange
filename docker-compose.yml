name: cloudexchange

# ────────────────────────────────────────────────────────────────────────
# Base stack — runs in both dev and prod modes.
# Production overrides live in docker-compose.prod.yml; the dev demo
# (with seed data) is exposed via the `demo` compose profile.
# ────────────────────────────────────────────────────────────────────────

services:
  # ────────────────────────────────────────────────────────────────────
  # PostgreSQL — application metadata
  # users, audit_log, app_settings (and later: domains, aliases, quotas)
  # ────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cx-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudexchange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudexchange-dev}
      POSTGRES_DB: ${POSTGRES_DB:-cloudexchange}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudexchange} -d ${POSTGRES_DB:-cloudexchange}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - cxnet

  # ────────────────────────────────────────────────────────────────────
  # Redis — sessions, rate limits, pub/sub for future IDLE notifications
  # ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cx-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - cxnet

  # ────────────────────────────────────────────────────────────────────
  # Mail backbone: Postfix + Dovecot, production-hardened.
  #
  # Rspamd (antispam / DKIM-DMARC-SPF / Bayes) replaces the SpamAssassin
  # + Amavis pair. ClamAV scans every inbound message. OpenDKIM signs
  # outbound mail. OpenDMARC verifies inbound alignment. Fail2ban bans
  # brute-force attackers on IMAP/SMTP.
  #
  # First boot takes ~2 minutes while ClamAV downloads its signature
  # database (~400 MB). Subsequent boots are fast.
  # ────────────────────────────────────────────────────────────────────
  mailserver:
    image: mailserver/docker-mailserver:14.0.0
    hostname: ${MAIL_HOSTNAME:-mail.cloudexchange.local}
    container_name: cx-mail
    environment:
      # ── Antispam, antivirus, signing
      - ENABLE_RSPAMD=1
      - ENABLE_CLAMAV=1
      - ENABLE_OPENDKIM=1
      - ENABLE_OPENDMARC=1
      - ENABLE_POLICYD_SPF=1
      - ENABLE_FAIL2BAN=1
      - ENABLE_AMAVIS=0
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_POSTGREY=0

      # ── Rspamd behaviour
      - RSPAMD_GREYLISTING=0
      - RSPAMD_LEARN=1
      - RSPAMD_HFILTER=1
      - MOVE_SPAM_TO_JUNK=1
      - MARK_SPAM_AS_READ=0
      - SPAM_SUBJECT=[SPAM]_

      # ── Dovecot extras
      - ENABLE_QUOTAS=1
      - ENABLE_MANAGESIEVE=1
      - DOVECOT_INET_PROTOCOLS=ipv4

      # ── Postfix / network
      - PERMIT_DOCKER=connected-networks
      - SSL_TYPE=
      - POSTFIX_MESSAGE_SIZE_LIMIT=52428800
      - OVERRIDE_HOSTNAME=${MAIL_HOSTNAME:-mail.cloudexchange.local}
      - POSTSCREEN_ACTION=enforce
      - SPOOF_PROTECTION=0
      - LOG_LEVEL=info
      - SUPERVISOR_LOGLEVEL=info
      - TZ=UTC

      # ── Account watcher: Dovecot picks up new mailbox accounts within
      #    POSTFIX_INET_PROTOCOLS interval after they're added to
      #    postfix-accounts.cf via `setup email add`.
      - ACCOUNT_PROVISIONER=FILE
    cap_add:
      - NET_ADMIN
    volumes:
      - mail-data:/var/mail
      - mail-state:/var/mail-state
      - mail-logs:/var/log/mail
      - ./infra/mail/config:/tmp/docker-mailserver
    healthcheck:
      test: ["CMD-SHELL", "ss -lnt | grep -q ':143 ' && ss -lnt | grep -q ':587 '"]
      interval: 15s
      timeout: 8s
      retries: 30
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 1500m
    restart: unless-stopped
    networks:
      - cxnet

  # ────────────────────────────────────────────────────────────────────
  # Calendar + contacts: Radicale (CalDAV + CardDAV)
  # Will be replaced by SOGo in Phase 2 for ActiveSync + scheduling.
  # ────────────────────────────────────────────────────────────────────
  radicale:
    image: tomsquest/docker-radicale:3.2.3.0
    container_name: cx-radicale
    volumes:
      - radicale-data:/data
      - ./infra/radicale/config:/config:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:5232/ -t 1 -T 2 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - cxnet

  # ────────────────────────────────────────────────────────────────────
  # BFF — bridges browser ↔ mail backbone via IMAP/SMTP/CalDAV/CardDAV.
  # Sessions live in Redis; admin metadata in Postgres.
  # ────────────────────────────────────────────────────────────────────
  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    container_name: cx-bff
    environment:
      - PORT=4000
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://${POSTGRES_USER:-cloudexchange}:${POSTGRES_PASSWORD:-cloudexchange-dev}@postgres:5432/${POSTGRES_DB:-cloudexchange}
      - IMAP_HOST=mailserver
      - IMAP_PORT=143
      - IMAP_SECURE=false
      - SMTP_HOST=mailserver
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - CALDAV_URL=http://radicale:5232
      - CARDDAV_URL=http://radicale:5232
      - CORS_ORIGIN=${PUBLIC_ORIGIN:-http://localhost:8080}
      - TRUST_PROXY=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailserver:
        condition: service_started
      radicale:
        condition: service_started
    restart: unless-stopped
    networks:
      - cxnet

  # ────────────────────────────────────────────────────────────────────
  # Frontend — Vite-built React/TS app served by an inner nginx
  # ────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
        VITE_DEMO_EMAIL: ${DEMO_EMAIL:-igor.petrov@cloudexchange.local}
        VITE_DEMO_PASSWORD: ${DEMO_PASSWORD:-cloud24demo}
    container_name: cx-frontend
    depends_on:
      - bff
    restart: unless-stopped
    networks:
      - cxnet

  # ────────────────────────────────────────────────────────────────────
  # Edge proxy — single public entry-point for the whole stack.
  # Phase 3 will add TLS termination via Certbot (acme.sh).
  # ────────────────────────────────────────────────────────────────────
  edge:
    image: nginx:1.27-alpine
    container_name: cx-edge
    volumes:
      - ./infra/edge/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/edge/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "8080:80"
      # "443:443" — enabled in Phase 3 once Certbot lands.
    depends_on:
      - bff
      - frontend
    restart: unless-stopped
    networks:
      - cxnet

  # ────────────────────────────────────────────────────────────────────
  # Demo data seeder — populates INBOX, Sent, contacts and events.
  # Enable with: docker compose --profile demo run --rm seed
  # ────────────────────────────────────────────────────────────────────
  seed:
    build:
      context: ./seed
      dockerfile: Dockerfile
    container_name: cx-seed
    profiles:
      - demo
    environment:
      - IMAP_HOST=mailserver
      - IMAP_PORT=143
      - IMAP_SECURE=false
      - SMTP_HOST=mailserver
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - CALDAV_URL=http://radicale:5232
      - CARDDAV_URL=http://radicale:5232
      - DEMO_EMAIL=${DEMO_EMAIL:-igor.petrov@cloudexchange.local}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-cloud24demo}
      - DEMO_DISPLAY_NAME=${DEMO_DISPLAY_NAME:-Игорь Петров}
    depends_on:
      mailserver:
        condition: service_healthy
      radicale:
        condition: service_started
    restart: "no"
    networks:
      - cxnet

volumes:
  postgres-data:
  redis-data:
  mail-data:
  mail-state:
  mail-logs:
  radicale-data:

networks:
  cxnet:
    driver: bridge
